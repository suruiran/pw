exe = "ssh"

[[args]]
name = "-B"
description = "Bind to specified network interface"
kind = "str"

[[args]]
name = "-b"
description = "Bind to specified source address"
kind = "str"
regexp = "^(?:\\d{1,3}\\.){3}\\d{1,3}$"

[[args]]
name = "-c"
description = "Specify cipher specification"
kind = "str"

[[args]]
name = "-D"
description = "Dynamic application-level port forwarding"
kind = "str"
regexp = "^(.+:)?\\d+$"

[[args]]
name = "-E"
description = "Append debug logs to log file"
kind = "filepath"
globs = ["*"]
dir_only = false

[[args]]
name = "-e"
description = "Set escape character"
kind = "str"

[[args]]
name = "-F"
description = "Specify alternative per-user configuration file"
kind = "filepath"
globs = ["*"]
dir_only = false

[[args]]
name = "-I"
description = "Specify PKCS#11 shared library"
kind = "filepath"
globs = ["*.so", "*.dll", "*.dylib"]
dir_only = false

[[args]]
name = "-i"
description = "Identity file"
kind = "filepath"
globs = ["*"]
dir_only = false
repeatable = true

[[args]]
name = "-J"
description = "Connect via jump host"
kind = "str"

[[args]]
name = "-L"
description = "Local port forwarding"
kind = "str"

[[args]]
name = "-l"
description = "Login name"
kind = "str"

[[args]]
name = "-m"
description = "Specify MAC algorithms"
kind = "str"

[[args]]
name = "-O"
description = "Control master command"
kind = "select"
options = ["check", "forward", "cancel", "exit", "stop", "proxy"]
allow_custom = true

[[args]]
name = "-o"
description = "Set configuration option"
kind = "pairs"
key = []
allow_custom_key = true
sep = "="

[args.value]
kind = "str"

[[args]]
name = "-P"
description = "Tag for configuration match"
kind = "str"

[[args]]
name = "-p"
description = "Port to connect to"
kind = "number"
int = true
min = 1
max = 65535

[[args]]
name = "-R"
description = "Remote port forwarding"
kind = "str"

[[args]]
name = "-S"
description = "Control socket path"
kind = "filepath"
globs = ["*"]
dir_only = false

[[args]]
name = "-W"
description = "Forward standard input/output to host:port"
kind = "str"
regexp = "^.+:\\d+$"

[[args]]
name = "-w"
description = "Tunnel device forwarding"
kind = "str"

[[args]]
name = "-Q"
description = "Query supported algorithms/features"
kind = "select"
options = [
    "cipher",
    "cipher-auth",
    "mac",
    "kex",
    "key",
    "key-cert",
    "key-plain",
    "protocol-version",
    "sig",
]
allow_custom = true

[[args]]
name = "destination"
description = "Destination host to connect to"
required = true
kind = "str"

[[args]]
name = "command"
description = "Remote command to execute"
kind = "str"
textarea = true

[[args]]
name = "argument"
description = "Arguments for remote command"
kind = "str"
repeatable = true

[[args]]
name = "-4"
description = "Force IPv4"
kind = "flag"
conflicts_with = ["-6"]

[[args]]
name = "-6"
description = "Force IPv6"
kind = "flag"
conflicts_with = ["-4"]

[[args]]
name = "-A"
description = "Enable agent forwarding"
kind = "flag"

[[args]]
name = "-a"
description = "Disable agent forwarding"
kind = "flag"
conflicts_with = ["-A"]

[[args]]
name = "-C"
description = "Enable compression"
kind = "flag"

[[args]]
name = "-f"
description = "Go to background before command execution"
kind = "flag"

[[args]]
name = "-G"
description = "Print configuration and exit"
kind = "flag"

[[args]]
name = "-g"
description = "Allow remote hosts to connect to local forwarded ports"
kind = "flag"

[[args]]
name = "-K"
description = "Enable GSSAPI authentication and forwarding"
kind = "flag"

[[args]]
name = "-k"
description = "Disable GSSAPI forwarding"
kind = "flag"
conflicts_with = ["-K"]

[[args]]
name = "-M"
description = "Master mode for connection sharing"
kind = "flag"

[[args]]
name = "-N"
description = "Do not execute remote command"
kind = "flag"
conflicts_with = ["command"]

[[args]]
name = "-n"
description = "Redirect stdin from /dev/null"
kind = "flag"

[[args]]
name = "-q"
description = "Quiet mode"
kind = "flag"

[[args]]
name = "-s"
description = "Request subsystem"
kind = "flag"

[[args]]
name = "-T"
description = "Disable pseudo-terminal allocation"
kind = "flag"

[[args]]
name = "-t"
description = "Force pseudo-terminal allocation"
kind = "flag"
conflicts_with = ["-T"]

[[args]]
name = "-V"
description = "Display version number"
kind = "flag"

[[args]]
name = "-v"
description = "Verbose mode"
kind = "flag"
repeatable = true

[[args]]
name = "-X"
description = "Enable X11 forwarding"
kind = "flag"

[[args]]
name = "-x"
description = "Disable X11 forwarding"
kind = "flag"
conflicts_with = ["-X"]

[[args]]
name = "-Y"
description = "Enable trusted X11 forwarding"
kind = "flag"
depends_on = ["-X"]

[[args]]
name = "-y"
description = "Send log information using syslog"
kind = "flag"
